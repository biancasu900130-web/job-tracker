<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--border:#E0DAD0;--text:#1A1714;--text2:#6B6560;--text3:#9C9590;--accent:#2B4B3C;--accent-l:#E8F0EB;--red:#C0392B;--red-l:#FDECEA;--amber:#A0622A;--amber-l:#FBF0E6;--blue:#3B52A0;--blue-l:#EEF2FB;--green-l:#E1F5EE;--green:#085041;--mono:'DM Mono',monospace;--serif:'Instrument Serif',serif;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:16px}
.back-btn{font-size:13px;color:var(--text2);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);display:flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--surface2)}
.header-meta{display:flex;flex-direction:column;gap:2px}
.header-title{font-family:var(--serif);font-size:20px}
.header-sub{font-size:12px;color:var(--text2);display:flex;gap:12px}
.header-sub span{display:flex;align-items:center;gap:4px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;font-family:var(--sans);font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.btn:hover{background:var(--surface2);border-color:#CBC4B8}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#1e3829}
.body{max-width:860px;margin:0 auto;padding:28px 32px}
.verdict-banner{border-radius:10px;padding:18px 22px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.verdict-title{font-size:18px;font-weight:500}
.verdict-reason{font-size:13px;margin-top:4px;opacity:.85}
.score-ring{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.score-num{font-family:var(--serif);font-size:36px;line-height:1}
.score-label{font-size:11px;font-family:var(--mono);opacity:.7;letter-spacing:.04em}
.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.section-title{font-size:13px;font-weight:500}
.section-count{font-size:11px;font-family:var(--mono);color:var(--text3);margin-left:auto}
/* Hard reqs */
.req-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:.5px solid var(--border)}
.req-row:last-child{border-bottom:none}
.req-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.req-text{flex:1}
.req-label{font-size:13px;font-weight:500;line-height:1.4}
.req-note{font-size:12px;color:var(--text2);margin-top:2px}
/* Gaps */
.gap-card{border-radius:8px;padding:12px 14px;margin-bottom:10px}
.gap-card:last-child{margin-bottom:0}
.gap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.gap-name{font-size:13px;font-weight:500}
.gap-tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:99px;letter-spacing:.04em;white-space:nowrap}
.gap-note{font-size:12px;color:var(--text2);line-height:1.5}
/* Strengths */
.strength-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:.5px solid var(--border)}
.strength-row:last-child{border-bottom:none}
.strength-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px}
/* Suggestions */
.sug-row{display:flex;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
.sug-row:last-child{border-bottom:none}
.sug-num{font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0;padding-top:1px;min-width:18px}
.sug-text{font-size:13px;line-height:1.6}
.sug-text.fatal{color:var(--red);font-weight:500}
/* Interview */
.int-row{display:flex;gap:10px;padding:7px 0;border-bottom:.5px solid var(--border)}
.int-row:last-child{border-bottom:none}
.int-arrow{color:var(--blue);font-size:14px;flex-shrink:0}
.empty{font-size:13px;color:var(--text3);padding:6px 0}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-family:var(--mono);font-size:13px}
.dots{display:inline-flex;gap:4px;margin-left:8px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dp 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.15}40%{opacity:1}}
@media(max-width:600px){.body{padding:16px}.header{padding:12px 16px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.close()">&#8592; Back</button>
    <div class="header-meta">
      <div class="header-title" id="hd-title">Loading...</div>
      <div class="header-sub">
        <span id="hd-status"></span>
        <span id="hd-date"></span>
      </div>
    </div>
  </div>
  <div class="header-actions" id="hd-actions" style="display:none">
    <button class="btn" id="btn-cl" onclick="openMain('cover')">Cover letter ↗</button>
    <button class="btn" id="btn-prep" onclick="openMain('prep')">Interview prep ↗</button>
    <button class="btn" id="btn-resume" onclick="openMain('resume')">Resume summary ↗</button>
    <button class="btn btn-p" onclick="copyReport()">Copy report</button>
  </div>
</div>

<div class="body" id="body-content">
  <div class="loading">Loading analysis<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>
</div>

<script>
function openMain(tab) {
  const pages = window.opener ? [window.opener] : [];
  if (window.opener && !window.opener.closed) {
    window.opener.focus();
    if (window.opener.goTab) window.opener.goTab(tab, window._jobIdx);
  }
}

function copyReport() {
  const text = document.getElementById('body-content').innerText;
  const title = document.getElementById('hd-title').innerText;
  navigator.clipboard.writeText(title + '\n\n' + text);
  event.target.textContent = 'Copied ✓';
  setTimeout(() => event.target.textContent = 'Copy report', 2000);
}

function esc(s) { 
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function render(job, analysis, idx) {
  window._jobIdx = idx;
  document.getElementById('hd-title').textContent = job.role + ' @ ' + job.co;
  document.getElementById('hd-status').textContent = job.status || 'Interested';
  document.getElementById('hd-date').textContent = job.date || '';
  document.getElementById('hd-actions').style.display = 'flex';
  document.title = job.role + ' @ ' + job.co;

  const r = analysis;
  const vBg = {
    'Strong Fit':  {bg:'#E1F5EE',color:'#085041',icon:'#1D9E75'},
    'Good Fit':    {bg:'#EAF3DE',color:'#27500A',icon:'#639922'},
    'Partial Fit': {bg:'#FAEEDA',color:'#633806',icon:'#BA7517'},
    'Weak Fit':    {bg:'#FCEBEB',color:'#791F1F',icon:'#E24B4A'},
    'Do Not Apply':{bg:'#F7C1C1',color:'#501313',icon:'#C0392B'},
  }[r.verdict] || {bg:'#F0EDE6',color:'#6B6560',icon:'#888'};

  const fatalCount = (r.gaps||[]).filter(g=>g.fatal).length;
  const structuralCount = (r.gaps||[]).filter(g=>g.type==='structural'&&!g.fatal).length;

  let html = '';

  // Verdict banner
  html += '<div class="verdict-banner" style="background:' + vBg.bg + ';color:' + vBg.color + '">';
  html += '<div><div class="verdict-title">' + r.verdict + '</div>';
  html += '<div class="verdict-reason">' + esc(r.verdict_reason) + '</div>';
  if (fatalCount > 0) html += '<div style="margin-top:8px;font-size:12px;font-family:var(--mono)">&#9888; ' + fatalCount + ' fatal gap' + (fatalCount>1?'s':'') + ' — see Gaps section</div>';
  html += '</div>';
  html += '<div class="score-ring"><div class="score-num">' + r.match_score + '%</div><div class="score-label">MATCH</div></div>';
  html += '</div>';

  // ── SECTION 1: Hard Requirements ──
  const reqs = r.hard_requirements || [];
  const metCount = reqs.filter(h=>h.status==='met').length;
  html += '<div class="section">';
  html += '<div class="section-header"><div class="section-icon" style="background:#EEF2FB;color:#3B52A0">&#10003;</div>';
  html += '<div class="section-title">Hard requirements</div>';
  html += '<div class="section-count">' + metCount + ' / ' + reqs.length + ' met</div></div>';
  if (reqs.length) {
    reqs.forEach(function(h) {
      var isMet = h.status === 'met', isPartial = h.status === 'partial';
      var iconBg = isMet ? '#E1F5EE' : isPartial ? '#FAEEDA' : '#FCEBEB';
      var iconColor = isMet ? '#085041' : isPartial ? '#633806' : '#791F1F';
      var icon = isMet ? '&#10003;' : isPartial ? '&#8776;' : '&#10007;';
      html += '<div class="req-row">';
      html += '<div class="req-icon" style="background:' + iconBg + ';color:' + iconColor + '">' + icon + '</div>';
      html += '<div class="req-text"><div class="req-label">' + esc(h.requirement) + '</div>';
      html += '<div class="req-note">' + esc(h.note) + '</div></div></div>';
    });
  } else {
    html += '<div class="empty">No hard requirements extracted.</div>';
  }
  html += '</div>';

  // ── SECTION 2: Gaps ──
  const gaps = r.gaps || [];
  html += '<div class="section">';
  html += '<div class="section-header"><div class="section-icon" style="background:#FAEEDA;color:#854F0B">&#9651;</div>';
  html += '<div class="section-title">Gaps</div>';
  const fatalBadge = fatalCount > 0 ? '<span style="font-size:10px;background:#FCEBEB;color:#791F1F;padding:2px 8px;border-radius:99px;font-family:var(--mono);margin-left:8px">' + fatalCount + ' fatal</span>' : '';
  const structBadge = structuralCount > 0 ? '<span style="font-size:10px;background:#FAEEDA;color:#633806;padding:2px 8px;border-radius:99px;font-family:var(--mono);margin-left:4px">' + structuralCount + ' structural</span>' : '';
  html += '<div style="margin-left:auto;display:flex;align-items:center">' + fatalBadge + structBadge + '</div></div>';
  if (gaps.length) {
    gaps.forEach(function(g) {
      var isFatal = g.fatal;
      var isStructural = g.type === 'structural';
      var bg = isFatal ? 'var(--red-l)' : isStructural ? 'var(--amber-l)' : 'var(--surface2)';
      var tagBg = isFatal ? '#FCEBEB' : isStructural ? '#FAEEDA' : 'var(--surface2)';
      var tagColor = isFatal ? '#791F1F' : isStructural ? '#633806' : 'var(--text3)';
      var tag = isFatal ? '🚫 FATAL' : isStructural ? '⚠ STRUCTURAL' : '△ SOFT';
      html += '<div class="gap-card" style="background:' + bg + '">';
      html += '<div class="gap-header"><div class="gap-name">' + esc(g.gap) + '</div>';
      html += '<span class="gap-tag" style="background:' + tagBg + ';color:' + tagColor + '">' + tag + '</span></div>';
      html += '<div class="gap-note">' + esc(g.note) + '</div></div>';
    });
  } else {
    html += '<div class="empty">No significant gaps identified.</div>';
  }
  html += '</div>';

  // ── SECTION 3: Strengths + Suggestions + Interview ──
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';

  // Strengths
  html += '<div class="section"><div class="section-header">';
  html += '<div class="section-icon" style="background:var(--accent-l);color:var(--accent)">&#9670;</div>';
  html += '<div class="section-title">Strengths</div></div>';
  (r.matches||[]).forEach(function(m) {
    html += '<div class="strength-row"><div class="strength-dot"></div><div style="font-size:13px;line-height:1.6">' + esc(m) + '</div></div>';
  });
  html += '</div>';

  // Interview focus
  html += '<div class="section"><div class="section-header">';
  html += '<div class="section-icon" style="background:var(--blue-l);color:var(--blue)">&#8594;</div>';
  html += '<div class="section-title">Emphasize in interview</div></div>';
  (r.interview_focus||[]).forEach(function(s) {
    html += '<div class="int-row"><div class="int-arrow">&#8594;</div><div style="font-size:13px;line-height:1.6">' + esc(s) + '</div></div>';
  });
  html += '</div>';
  html += '</div>'; // end grid

  // Suggestions (full width)
  html += '<div class="section" style="margin-top:0"><div class="section-header">';
  html += '<div class="section-icon" style="background:#F0EDE6;color:#6B6560">&#9998;</div>';
  html += '<div class="section-title">Suggestions</div></div>';
  (r.suggestions||[]).forEach(function(s, i) {
    var isFatal = s.toLowerCase().includes('not apply') || s.toLowerCase().includes('do not') || s.toLowerCase().includes('skip');
    html += '<div class="sug-row"><div class="sug-num">' + (i+1) + '.</div>';
    html += '<div class="sug-text' + (isFatal?' fatal':'') + '">' + esc(s) + '</div></div>';
  });
  html += '</div>';

  document.getElementById('body-content').innerHTML = html;
}

// Load data from localStorage
window.addEventListener('load', function() {
  try {
    const data = JSON.parse(localStorage.getItem('detail_view') || '{}');
    if (data.job && data.analysis) {
      render(data.job, data.analysis, data.idx);
    } else if (data.job && !data.analysis) {
      document.getElementById('body-content').innerHTML = '<div class="loading">No analysis data found. Please run ⚡ Analyze from the tracker first.</div>';
      document.getElementById('hd-title').textContent = (data.job.role||'?') + ' @ ' + (data.job.co||'?');
    } else {
      document.getElementById('body-content').innerHTML = '<div class="loading">No data found. Please open this page from the Job Tracker.</div>';
    }
  } catch(e) {
    document.getElementById('body-content').innerHTML = '<div class="loading">Error loading data: ' + e.message + '</div>';
  }
});
</script>
</body>
</html>
